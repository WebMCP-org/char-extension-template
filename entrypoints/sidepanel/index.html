<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LangGuard.AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* ── LangGuard Dark Theme (default) ──
     * Extracted from https://dev.app.langguard.ai/ (dark mode)
     * Primary:    oklch(80.45% .1653 166.788) → #00e0a8 (teal)
     * Background: oklch(18.91% .0188 255.753) → #0e141c
     * Card:       oklch(23.62% .0291 255.253) → #151f2c
     * Border:     oklch(37.71% .0644 194.769) → #004c4c (teal-tinted)
     * Font: Plus Jakarta Sans
     */
    :root {
      --char-color-background: #0e141c;
      --char-color-foreground: #e6f0f8;
      --char-color-card: #151f2c;
      --char-color-card-foreground: #e6f0f8;
      --char-color-border: #004c4c;
      --char-color-muted: #1a2430;
      --char-color-muted-foreground: #8ba1b8;
      --char-color-secondary: #004c4c;
      --char-color-secondary-foreground: #00e0a8;
      --char-color-accent: #004c4c;
      --char-color-accent-foreground: #00e0a8;
      --char-color-ring: #00e0a8;
      --char-color-primary: #00e0a8;
      --char-color-primary-foreground: #0e141c;
      --char-color-input: #1a2430;
      --char-color-destructive: #ef4444;
      --char-color-destructive-foreground: #ffffff;
      --char-font-sans: "Plus Jakarta Sans", system-ui, -apple-system, sans-serif;
      --char-font-mono: "Overpass Mono", ui-monospace, monospace;
      --char-font-size-xs: 12px;
      --char-font-size-sm: 14px;
      --char-radius: 8px;
      --char-radius-lg: 12px;
      --char-duration-slow: 2s;

      /* Tier 2 - Component refinements (LangGuard style) */
      --char-user-bubble-bg: #1a2430;
      --char-assistant-bubble-bg: transparent;
      --char-composer-bg: #0e141c;
      --char-composer-border: #004c4c;
      --char-code-bg: #0a0f15;
      --char-code-text: #e6f0f8;
    }

    /* ── LangGuard Light Theme (skipped when html.dark is set) ── */
    @media (prefers-color-scheme: light) {
      :root:not(.dark) {
        --char-color-background: #f7f5f3;
        --char-color-foreground: #1e2229;
        --char-color-card: #fdfbfa;
        --char-color-card-foreground: #1e2229;
        --char-color-border: #e2ddd9;
        --char-color-muted: #f4f1ee;
        --char-color-muted-foreground: #656972;
        --char-color-secondary: #dfe6e5;
        --char-color-secondary-foreground: #1e2229;
        --char-color-accent: #dfe6e5;
        --char-color-accent-foreground: #1e2229;
        --char-color-ring: #00c9d3;
        --char-color-primary: #00c9d3;
        --char-color-primary-foreground: #1e2229;
        --char-color-input: #faf8f6;
        --char-user-bubble-bg: #f4f1ee;
        --char-composer-bg: #f7f5f3;
        --char-composer-border: #e2ddd9;
        --char-code-bg: #1e2229;
        --char-code-text: #f7f5f3;
      }
    }

    html, body {
      width: 100%;
      height: 100vh;
      overflow: hidden;
      background: var(--char-color-background);
      font-family: var(--char-font-sans);
      color: var(--char-color-foreground);
    }

    /* ── Layout ── */
    #sidebar-root {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ── Agent container ── */
    #agent-container {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    char-agent {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* ── Auth overlay ── */
    #auth-status {
      position: absolute;
      inset: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      background: var(--char-color-background);
      transition: opacity 0.2s ease, visibility 0.2s ease;
    }
    /* Gradient glow behind auth card (matches LangGuard login) */
    #auth-status::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 60%, rgba(0, 224, 168, 0.08) 0%, transparent 70%),
        radial-gradient(ellipse 50% 40% at 80% 40%, rgba(0, 201, 211, 0.06) 0%, transparent 70%);
      pointer-events: none;
    }
    #auth-status[data-visible="false"] {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    #auth-status-card {
      width: min(280px, 100%);
      text-align: center;
      position: relative;
      z-index: 1;
    }
    #auth-status-icon {
      width: 48px;
      height: 48px;
      margin: 0 auto 16px;
      border-radius: var(--char-radius-lg);
      background: var(--char-color-card);
      border: 1px solid var(--char-color-border);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #auth-status-title {
      font-size: var(--char-font-size-sm);
      font-weight: 600;
      margin-bottom: 6px;
    }
    #auth-status-message {
      font-size: var(--char-font-size-xs);
      line-height: 1.5;
      color: var(--char-color-muted-foreground);
      margin-bottom: 16px;
    }
    #auth-status-button {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: none;
      border-radius: var(--char-radius);
      background: var(--char-color-primary);
      color: var(--char-color-primary-foreground);
      padding: 8px 16px;
      font-size: var(--char-font-size-xs);
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, box-shadow 0.15s;
    }
    #auth-status-button:hover {
      opacity: 0.9;
      box-shadow: 0 0 20px rgba(0, 224, 168, 0.35);
    }

    /* ── Loading state ── */
    #auth-status[data-state="loading"] #auth-status-icon {
      animation: pulse var(--char-duration-slow) ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }
  </style>
</head>
<body>
  <div id="sidebar-root">
    <div id="agent-container">
      <!-- char-agent element is injected here by main.ts -->
      <div id="auth-status" data-visible="true" data-state="loading">
        <div id="auth-status-card">
          <div id="auth-status-icon">
            <!-- LangGuard eye icon -->
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
              <defs>
                <linearGradient id="lg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#00e0a8"/>
                  <stop offset="100%" stop-color="#00c9d3"/>
                </linearGradient>
              </defs>
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="url(#lg-grad)" stroke-width="1.5" fill="none"/>
              <circle cx="12" cy="12" r="3.5" fill="url(#lg-grad)"/>
            </svg>
          </div>
          <div id="auth-status-title">Sign in to LangGuard.AI</div>
          <div id="auth-status-message">Connect your account to monitor and govern your AI agents.</div>
          <button id="auth-status-button" type="button">
            Sign in
          </button>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="./main.ts"></script>
</body>
</html>
